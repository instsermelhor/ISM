name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract dist-hostinger.zip
        run: |
          mkdir -p dist-deploy
          unzip dist-hostinger.zip -d dist-deploy
          rm -rf dist-deploy/dist
          echo "=== Files to deploy ==="
          find dist-deploy -type f

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP
        env:
          LFTP_PASSWORD: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          lftp -u "${{ secrets.HOSTINGER_USER }},$LFTP_PASSWORD" \
            -p "${{ secrets.HOSTINGER_PORT }}" \
            "sftp://${{ secrets.HOSTINGER_HOST }}" \
            -e "set sftp:auto-confirm yes; set net:max-retries 3; mirror -R --delete --verbose dist-deploy/ /public_html/; bye"
