name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract dist-hostinger.zip
        run: |
          mkdir -p dist-deploy
          unzip dist-hostinger.zip -d dist-deploy
          rm -rf dist-deploy/dist
          cat > dist-deploy/.htaccess << 'EOF'
          Options -MultiViews
          RewriteEngine On
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteRule ^ index.html [QSA,L]
          EOF
          echo "=== Files to deploy ==="
          find dist-deploy -type f

      - name: Install tools
        run: sudo apt-get install -y sshpass lftp

      - name: List domains dir (diagnostic)
        timeout-minutes: 2
        env:
          SFTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          echo "$SFTP_PASS" > /tmp/sftp_pass.txt
          lftp -e "
            set net:timeout 20;
            set net:max-retries 2;
            set sftp:connect-program 'sshpass -f /tmp/sftp_pass.txt ssh -p ${{ secrets.HOSTINGER_PORT }} -l ${{ secrets.HOSTINGER_USER }} -o StrictHostKeyChecking=no';
            open sftp://${{ secrets.HOSTINGER_HOST }};
            ls -la domains/;
            bye
          " || true
          rm -f /tmp/sftp_pass.txt

      - name: Deploy via SFTP
        timeout-minutes: 5
        env:
          SFTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          echo "$SFTP_PASS" > /tmp/sftp_pass.txt
          lftp -e "
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set sftp:connect-program 'sshpass -f /tmp/sftp_pass.txt ssh -p ${{ secrets.HOSTINGER_PORT }} -l ${{ secrets.HOSTINGER_USER }} -o StrictHostKeyChecking=no';
            open sftp://${{ secrets.HOSTINGER_HOST }};
            mirror -R --delete --verbose dist-deploy/ domains/honeydew-spoonbill-451427.hostingersite.com/public_html/;
            bye
          "
          rm -f /tmp/sftp_pass.txt
