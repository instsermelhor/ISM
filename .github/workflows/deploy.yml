name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract dist-hostinger.zip
        run: |
          mkdir -p dist-deploy
          unzip dist-hostinger.zip -d dist-deploy
          rm -rf dist-deploy/dist
          echo "=== Files to deploy ==="
          find dist-deploy -type f

      - name: Install tools
        run: sudo apt-get install -y sshpass lftp

      - name: Deploy via SFTP
        env:
          SSHPASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          lftp -e "
            set sftp:connect-program 'sshpass -e ssh -o StrictHostKeyChecking=no';
            open -p ${{ secrets.HOSTINGER_PORT }} sftp://${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }};
            mirror -R --delete --verbose dist-deploy/ /public_html/;
            bye
          "
