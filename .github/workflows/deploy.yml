name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Extract main site from zip
        run: |
          mkdir -p dist-deploy
          unzip dist-hostinger.zip -d dist-deploy
          rm -rf dist-deploy/admin dist-deploy/dist
          printf '%s\n' \
            'Options -MultiViews' \
            'RewriteEngine On' \
            '' \
            'RewriteCond %{REQUEST_FILENAME} -f [OR]' \
            'RewriteCond %{REQUEST_FILENAME} -d' \
            'RewriteRule ^ - [L]' \
            '' \
            'RewriteRule ^ /index.html [QSA,L]' \
            > dist-deploy/.htaccess
          echo "=== Main site files ==="
          find dist-deploy -type f

      - name: Build admin panel
        run: |
          cd admin
          npm ci
          npm run build

      - name: Create admin .htaccess
        run: |
          printf '%s\n' \
            'Options -MultiViews' \
            'RewriteEngine On' \
            '' \
            'RewriteCond %{REQUEST_FILENAME} -f [OR]' \
            'RewriteCond %{REQUEST_FILENAME} -d' \
            'RewriteRule ^ - [L]' \
            '' \
            'RewriteRule ^ /index.html [QSA,L]' \
            > admin/dist/.htaccess
          echo "=== Admin panel files ==="
          find admin/dist -type f

      - name: Install deployment tools
        run: sudo apt-get install -y sshpass lftp

      - name: Deploy main site
        timeout-minutes: 5
        env:
          SFTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          echo "$SFTP_PASS" > /tmp/sftp_pass.txt
          lftp -e "
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set sftp:connect-program 'sshpass -f /tmp/sftp_pass.txt ssh -p ${{ secrets.HOSTINGER_PORT }} -l ${{ secrets.HOSTINGER_USER }} -o StrictHostKeyChecking=no';
            open sftp://${{ secrets.HOSTINGER_HOST }};
            mirror -R --delete --verbose dist-deploy/ domains/institutosermelhor.org/public_html/;
            bye
          "
          rm -f /tmp/sftp_pass.txt

      - name: Deploy admin panel
        timeout-minutes: 5
        env:
          SFTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          echo "$SFTP_PASS" > /tmp/sftp_pass.txt
          lftp -e "
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set sftp:connect-program 'sshpass -f /tmp/sftp_pass.txt ssh -p ${{ secrets.HOSTINGER_PORT }} -l ${{ secrets.HOSTINGER_USER }} -o StrictHostKeyChecking=no';
            open sftp://${{ secrets.HOSTINGER_HOST }};
            mirror -R --delete --verbose admin/dist/ domains/institutosermelhor.org/public_html/admin/;
            bye
          "
          rm -f /tmp/sftp_pass.txt
