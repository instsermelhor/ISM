name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build main site
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          npm ci
          npm run build
          printf '%s\n' \
            'Options -MultiViews' \
            'RewriteEngine On' \
            '' \
            'RewriteCond %{REQUEST_FILENAME} -f [OR]' \
            'RewriteCond %{REQUEST_FILENAME} -d' \
            'RewriteRule ^ - [L]' \
            '' \
            'RewriteRule ^ /index.html [QSA,L]' \
            > dist/.htaccess

      - name: Build admin panel
        env:
          VITE_SITE_URL: https://institutosermelhor.org
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          cd admin
          npm ci
          npm run build
          printf '%s\n' \
            'Options -MultiViews' \
            'RewriteEngine On' \
            '' \
            'RewriteCond %{REQUEST_FILENAME} -f [OR]' \
            'RewriteCond %{REQUEST_FILENAME} -d' \
            'RewriteRule ^ - [L]' \
            '' \
            'RewriteRule ^ /index.html [QSA,L]' \
            > dist/.htaccess

      - name: Install deployment tools
        run: sudo apt-get install -y sshpass lftp

      - name: Deploy main site
        timeout-minutes: 5
        env:
          SFTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          echo "$SFTP_PASS" > /tmp/sftp_pass.txt
          lftp -e "
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set sftp:connect-program 'sshpass -f /tmp/sftp_pass.txt ssh -p ${{ secrets.HOSTINGER_PORT }} -l ${{ secrets.HOSTINGER_USER }} -o StrictHostKeyChecking=no';
            open sftp://${{ secrets.HOSTINGER_HOST }};
            mirror -R --delete --verbose dist/ domains/institutosermelhor.org/public_html/;
            bye
          "
          rm -f /tmp/sftp_pass.txt

      - name: Deploy admin panel
        timeout-minutes: 5
        env:
          SFTP_PASS: ${{ secrets.HOSTINGER_PASSWORD }}
        run: |
          echo "$SFTP_PASS" > /tmp/sftp_pass.txt
          lftp -e "
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set sftp:connect-program 'sshpass -f /tmp/sftp_pass.txt ssh -p ${{ secrets.HOSTINGER_PORT }} -l ${{ secrets.HOSTINGER_USER }} -o StrictHostKeyChecking=no';
            open sftp://${{ secrets.HOSTINGER_HOST }};
            mirror -R --delete --verbose admin/dist/ domains/institutosermelhor.org/public_html/admin/;
            bye
          "
          rm -f /tmp/sftp_pass.txt
